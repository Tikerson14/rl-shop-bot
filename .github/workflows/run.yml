name: RL Shop Bot

on:
  schedule:
    - cron: "*/5 20-21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot.py
